name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build portable app
        run: npm run dist:dir

      - name: Create portable zip
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          Compress-Archive -Path release/win-unpacked/* -DestinationPath "release/Tempo-$version-win-unpacked.zip" -Force

      - name: Stage portable asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item -LiteralPath (Get-ChildItem release -Filter "Tempo-*-win-unpacked.zip").FullName -Destination release-assets

      - name: Build installer
        id: installer
        continue-on-error: true
        run: npm run dist

      - name: Stage installer asset
        if: always()
        shell: pwsh
        run: |
          $installer = Get-ChildItem release -Filter "Tempo Setup *.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "Missing Windows installer output."
          }
          Copy-Item -LiteralPath $installer.FullName -Destination release-assets

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tempo-windows
          path: release-assets/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
